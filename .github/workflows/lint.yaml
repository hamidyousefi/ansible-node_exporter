name: ansible-lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ansible-lint
        run: pip install ansible-dev-tools
      - name: Run ansible-lint
        run: ansible-lint .
